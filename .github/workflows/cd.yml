# CD Pipeline — Continuous Deployment
# Runs after the CI workflow succeeds on the main branch.

name: CD

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    environment:
      name: production
      url: ${{ steps.deploy-info.outputs.url }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install production dependencies
        run: pip install -r requirements.txt

      - name: Run smoke test before deploy
        run: |
          python -c "
          from app import create_app
          app = create_app()
          client = app.test_client()
          r = client.get('/health')
          assert r.status_code == 200, 'Health check failed'
          print('Smoke test passed')
          "

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
        continue-on-error: true

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            portfolio:latest
            portfolio:${{ github.event.workflow_run.head_sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
        continue-on-error: true

      - name: Deploy info
        id: deploy-info
        run: |
          echo "url=https://github.com/${{ github.repository }}" >> "$GITHUB_OUTPUT"
          echo "Deployed commit: ${{ github.event.workflow_run.head_sha }}"

      - name: Deployment summary
        run: |
          echo "## Deployment Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Commit:** \`${{ github.event.workflow_run.head_sha }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Branch:** main" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Environment:** production" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Add \`DOCKER_USERNAME\` and \`DOCKER_PASSWORD\` secrets to push images to Docker Hub." >> "$GITHUB_STEP_SUMMARY"
